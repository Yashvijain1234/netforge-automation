# NetForge inventory.
# `defaults` applies to every device; per-device keys override it.
# Secrets can be inlined for a lab or pulled from env vars via `env:VAR_NAME`.

defaults:
  platform: cisco_ios
  username: admin
  password: env:NETFORGE_PASSWORD   # reads $NETFORGE_PASSWORD at runtime

devices:
  - name: core-sw1
    host: 10.0.1.1
    role: core

  - name: dist-sw1
    host: 10.0.1.2
    role: distribution

  - name: dist-sw2
    host: 10.0.1.3
    role: distribution

  - name: access-sw1
    host: 10.0.2.10
    role: access

  - name: edge-rtr1
    host: 10.0.0.254
    role: edge
    platform: cisco_xe
